name: G9 quality gates

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -r requirements-analysis.txt pytest
      - run: python scripts/check_public_safety.py
      - run: pytest -q
      - name: Compile application
        run: python -m py_compile dashboard/app.py src/*.py run.py
      - name: Streamlit startup smoke test
        env:
          APP_PASSWORD: ci-only-temporary-password
        run: |
          streamlit run dashboard/app.py --server.headless true --server.port 8501 > /tmp/streamlit.log 2>&1 &
          for i in {1..30}; do
            if curl --fail --silent http://localhost:8501/_stcore/health | grep -q ok; then exit 0; fi
            sleep 1
          done
          cat /tmp/streamlit.log
          exit 1
